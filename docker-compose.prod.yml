version: '3.8'

# Production deployment configuration
# Use with: docker-compose -f docker-compose.prod.yml up -d

services:
  # ===========================================
  # POSTGRESQL - Production database with replication
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: ape-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ape_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ape_db
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ape_user} -d ape_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ===========================================
  # REDIS Cluster for high availability
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: ape-redis-prod
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ===========================================
  # APE API Server - Production with replicas
  # ===========================================
  ape-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ape-api-prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ape_user}:${POSTGRES_PASSWORD}@postgres:5432/ape_db
      REDIS_URL: redis://redis:6379/0
      APE_HOST: 0.0.0.0
      APE_PORT: 8000
      APE_LOG_LEVEL: warning
      APE_DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      # LLM Configuration
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Integrations
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITLAB_TOKEN: ${GITLAB_TOKEN}
      DATADOG_API_KEY: ${DATADOG_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
    volumes:
      - ./logs:/app/logs
      - ./artifacts:/app/artifacts
      - ./contracts:/app/contracts:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ===========================================
  # Celery Workers - Scaled for production
  # ===========================================
  ape-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A server.workers.celery_app worker --loglevel=warning --concurrency=${CELERY_WORKER_CONCURRENCY:-8} --prefetch-multiplier=1
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ape_user}:${POSTGRES_PASSWORD}@postgres:5432/ape_db
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITLAB_TOKEN: ${GITLAB_TOKEN}
      DATADOG_API_KEY: ${DATADOG_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
    volumes:
      - ./logs:/app/logs
      - ./artifacts:/app/artifacts
      - ./contracts:/app/contracts:ro
    depends_on:
      - ape-api
      - redis
    deploy:
      replicas: 6
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          cpus: '4'
          memory: 8G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ===========================================
  # Celery Beat - Scheduled tasks
  # ===========================================
  ape-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A server.workers.celery_app beat --loglevel=warning
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ape_user}:${POSTGRES_PASSWORD}@postgres:5432/ape_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # ===========================================
  # Flower - Celery monitoring (protected)
  # ===========================================
  ape-flower:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A server.workers.celery_app flower --port=5555 --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      - redis
    deploy:
      replicas: 1

  # ===========================================
  # Nginx - Reverse proxy & load balancer
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: ape-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - ape-api
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  # ===========================================
  # Prometheus - Production monitoring
  # ===========================================
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: ape-prometheus-prod
    volumes:
      - ./monitoring/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_prod_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    deploy:
      resources:
        limits:
          memory: 4G
    restart: always

  # ===========================================
  # Grafana - Production dashboards
  # ===========================================
  grafana:
    image: grafana/grafana:10.2.3
    container_name: ape-grafana-prod
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_URL}
    volumes:
      - grafana_prod_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 2G
    restart: always

volumes:
  postgres_prod_data:
  redis_prod_data:
  prometheus_prod_data:
  grafana_prod_data:

networks:
  default:
    name: ape-network-prod
