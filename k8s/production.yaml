# APE - Autonomous Production Engineer
# Kubernetes Production Deployment

apiVersion: v1
kind: Namespace
metadata:
  name: ape-system
  labels:
    name: ape-system
    app.kubernetes.io/name: ape
    app.kubernetes.io/version: "1.0.0"

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: ape-config
  namespace: ape-system
data:
  APE_HOST: "0.0.0.0"
  APE_PORT: "8000"
  APE_LOG_LEVEL: "info"
  APE_DEBUG: "false"
  CELERY_WORKER_CONCURRENCY: "4"
  CELERY_TASK_TIME_LIMIT: "1800"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_MINUTES: "60"
  LLM_PROVIDER: "openai"
  LLM_MODEL: "gpt-4-turbo-preview"

---
# Secrets (placeholder - should be managed externally)
apiVersion: v1
kind: Secret
metadata:
  name: ape-secrets
  namespace: ape-system
type: Opaque
stringData:
  SECRET_KEY: "change-me-in-production-min-32-chars"
  DATABASE_PASSWORD: "change-me"
  REDIS_PASSWORD: "change-me"
  # Add other secrets as needed

---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ape-system
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "ape_user"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ape-secrets
                  key: DATABASE_PASSWORD
            - name: POSTGRES_DB
              value: "ape_db"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ape_user
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ape_user
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ape-system
spec:
  ports:
    - port: 5432
      targetPort: postgres
  selector:
    app: postgres
  clusterIP: None

---
# Redis StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: ape-system
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "2gb"
            - --maxmemory-policy
            - "allkeys-lru"
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "4Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ape-system
spec:
  ports:
    - port: 6379
      targetPort: redis
  selector:
    app: redis
  clusterIP: None

---
# APE API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ape-api
  namespace: ape-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ape-api
  template:
    metadata:
      labels:
        app: ape-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: ape-api
          image: ape-auto:latest
          imagePullPolicy: Always
          command:
            - uvicorn
            - server.main:app
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: ape-config
            - secretRef:
                name: ape-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql://ape_user:$(DATABASE_PASSWORD)@postgres:5432/ape_db"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: artifacts
              mountPath: /app/artifacts
      volumes:
        - name: logs
          emptyDir: {}
        - name: artifacts
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: ape-api
                topologyKey: kubernetes.io/hostname

---
# APE API Service
apiVersion: v1
kind: Service
metadata:
  name: ape-api
  namespace: ape-system
  labels:
    app: ape-api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: ape-api

---
# APE API HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ape-api-hpa
  namespace: ape-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ape-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

---
# Celery Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ape-worker
  namespace: ape-system
spec:
  replicas: 6
  selector:
    matchLabels:
      app: ape-worker
  template:
    metadata:
      labels:
        app: ape-worker
    spec:
      containers:
        - name: ape-worker
          image: ape-auto:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - server.workers.celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
          envFrom:
            - configMapRef:
                name: ape-config
            - secretRef:
                name: ape-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql://ape_user:$(DATABASE_PASSWORD)@postgres:5432/ape_db"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: artifacts
              mountPath: /app/artifacts
      volumes:
        - name: logs
          emptyDir: {}
        - name: artifacts
          emptyDir: {}

---
# Celery Worker HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ape-worker-hpa
  namespace: ape-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ape-worker
  minReplicas: 6
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# Celery Beat Deployment (single replica)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ape-beat
  namespace: ape-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ape-beat
  template:
    metadata:
      labels:
        app: ape-beat
    spec:
      containers:
        - name: ape-beat
          image: ape-auto:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - server.workers.celery_app
            - beat
            - --loglevel=info
          envFrom:
            - configMapRef:
                name: ape-config
            - secretRef:
                name: ape-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql://ape_user:$(DATABASE_PASSWORD)@postgres:5432/ape_db"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ape-ingress
  namespace: ape-system
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/connection-proxy-header: "keep-alive"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  rules:
    - host: ape.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ape-api
                port:
                  number: 80
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: ape-api
                port:
                  number: 80
  tls:
    - hosts:
        - ape.example.com
      secretName: ape-tls-secret

---
# NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ape-network-policy
  namespace: ape-system
spec:
  podSelector:
    matchLabels:
      app: ape-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - podSelector:
            matchLabels:
              app: ape-worker
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ape-api-pdb
  namespace: ape-system
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: ape-api

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ape-worker-pdb
  namespace: ape-system
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: ape-worker
