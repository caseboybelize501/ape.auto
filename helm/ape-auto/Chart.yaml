# APE - Autonomous Production Engineer
# Helm Chart

apiVersion: v2
name: ape-auto
description: Autonomous Production Engineer - Production-grade software engineering platform
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - ape
  - autonomous
  - engineering
  - ai
  - code-generation
home: https://github.com/caseboybelize501/ape.auto
sources:
  - https://github.com/caseboybelize501/ape.auto
maintainers:
  - name: APE Team
    email: team@ape.auto

dependencies:
  - name: postgresql
    version: 12.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
